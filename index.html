
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Us</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Prevent favicon 404 -->
<link rel="icon" href="data:,">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

/* 🌈 Animated Gradient Background */
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #3a1c71);
  background-size: 400% 400%;
  animation: gradientMove 18s ease infinite;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* 🧊 Glass Card */
.form-card {
  width: 420px;
  padding: 38px 42px;
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(18px);
  box-shadow: 0 25px 60px rgba(0,0,0,0.38);
  border: 1px solid rgba(255,255,255,0.12);
  color: #ffffff;
}

h2 {
  margin: 0 0 6px;
  font-weight: 600;
}

p {
  font-size: 14px;
  color: #d0d6e0;
  margin-bottom: 26px;
}

label {
  font-size: 13px;
  color: #d0d6e0;
  margin-bottom: 6px;
  display: block;
}

input, textarea {
  width: 100%;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.12);
  color: #ffffff;
  font-size: 14px;
  margin-bottom: 18px;
}

input:focus, textarea:focus {
  outline: none;
  border-color: #7aa2ff;
  background: rgba(255,255,255,0.18);
}

textarea {
  resize: none;
  height: 100px;
}

/* ✨ Button */
button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-size: 15px;
  font-weight: 500;
  background: linear-gradient(135deg, #7aa2ff, #9f7aea);
  color: #0e1020;
  box-shadow: 0 12px 30px rgba(122,162,255,0.45);
}

button:hover {
  transform: translateY(-2px);
}

.status {
  margin-top: 16px;
  font-size: 13px;
  text-align: center;
  opacity: 0;
  transition: opacity 0.5s ease;
}
</style>
</head>

<body>

<div class="form-card">
  <h2>Let’s Talk</h2>
  <p>We’ll get back to you within 24 hours.</p>

  <form id="contactForm">
    <label>Name</label>
    <input type="text" id="name" required>

    <label>Email</label>
    <input type="email" id="email" required>

    <label>Message</label>
    <textarea id="message" required></textarea>

    <button type="submit">Send Message</button>
  </form>

  <div class="status" id="status"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const form = document.getElementById("contactForm");
  const status = document.getElementById("status");

  const nameInput = document.getElementById("name");
  const emailInput = document.getElementById("email");
  const messageInput = document.getElementById("message");

  function showStatus(text, color) {
    status.textContent = text;
    status.style.color = color;
    status.style.opacity = "1";

    setTimeout(() => {
      status.style.opacity = "0";
    }, 4000);
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    showStatus("Sending...", "#d0d6e0");

    const data = {
      name: nameInput.value.trim(),
      email: emailInput.value.trim(),
      message: messageInput.value.trim()
    };

    try {
      const res = await fetch(
        "https://a9vnj067g3.execute-api.eu-north-1.amazonaws.com/prod/submit_form_handler",
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        }
      );

      const result = await res.json();

      if (res.ok) {
        showStatus("✓ Message sent successfully", "#7dffb3");
        form.reset();
      } else {
        showStatus("✕ " + (result.message || "Error"), "#ff9b9b");
      }

    } catch (err) {
      console.error(err);
      showStatus("✕ Network error", "#ff9b9b");
    }
  });

});
</script>

</body>
</html>
